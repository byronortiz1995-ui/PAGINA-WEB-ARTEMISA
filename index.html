<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMISA | Soluciones Técnicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --black: #0f172a; --white: #ffffff;
            --gray-bg: #f8fafc; --green: #22c55e; --slate-200: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--gray-bg); margin: 0; overflow-x: hidden; }

        /* --- EFECTO NAVEGACIÓN APP --- */
        .page { display: none; width: 100%; min-height: 100vh; animation: slideIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(50px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        /* --- HOME / PRESENTACIÓN --- */
        .hero {
            background: linear-gradient(135deg, var(--black) 0%, #1e293b 100%);
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white; padding: 0 20px;
        }

        .hero h1 { font-size: 3.5rem; letter-spacing: 8px; color: var(--gold); margin: 0; }
        .hero p { max-width: 600px; margin: 20px 0 40px; color: #cbd5e1; line-height: 1.6; }

        .btn-main-cta {
            background: var(--gold); color: var(--black); padding: 18px 50px;
            border-radius: 50px; font-weight: 800; border: none; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }

        /* --- SECCIÓN CATÁLOGO (VISTA APP) --- */
        .header-app { 
            background: var(--black); color: white; padding: 20px; 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }

        .btn-back { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .nav-filter { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        
        .btn-filter { 
            background: white; border: 1px solid var(--slate-200); padding: 10px 20px; 
            border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-filter.active { background: var(--gold); border-color: var(--gold); color: var(--black); }

        /* --- CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            border: 1px solid var(--slate-200);
        }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .price-tag { 
            font-size: 1.5rem; font-weight: 800; color: var(--black); 
            background: var(--gray-bg); padding: 10px; border-radius: 12px; 
            text-align: center; margin: 15px 0;
        }

        .btn-buy { 
            background: var(--black); color: var(--gold); padding: 15px; 
            border-radius: 12px; font-weight: 800; border: none; cursor: pointer; width: 100%;
        }
        .btn-buy:hover { background: var(--green); color: white; }

    </style>
</head>
<body>

<div id="view-home" class="page active">
    <header class="hero">
        <h1>ARTEMISA</h1>
        <p>Soluciones Técnicas Integrales. Innovación en Hardware, Software y Mantenimiento Especializado.</p>
        <button class="btn-main-cta" onclick="showView('view-catalog')">Entrar al Catálogo</button>
    </header>
</div>

<div id="view-catalog" class="page">
    <div class="header-app">
        <button class="btn-back" onclick="showView('view-home')">← Volver</button>
        <span style="font-weight: 800; color: var(--gold);">ARTEMISA SHOP</span>
        <div style="width: 70px;"></div>
    </div>

    <div class="container">
        <div class="nav-filter">
            <button class="btn-filter active" onclick="filterItems('todos', this)">Todos</button>
            <button class="btn-filter" onclick="filterItems('servicio', this)">Servicios</button>
            <button class="btn-filter" onclick="filterItems('tienda', this)">Tienda</button>
        </div>

        <div class="grid" id="grid-container">
            </div>
    </div>
</div>

<script>
    const TEL = "593939344200";
    const API_URL = "https://script.google.com/macros/s/AKfycbwQMvnCggh9cH8x9Om_FOq6G6B6NJmYgk0I2ks5Wye-dW6hS29DjNeFK3vXt-QXIAMyJQ/exec";

    // Función para cambiar de "página" dentro del mismo HTML
    function showView(viewId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0,0);
        if(viewId === 'view-catalog') cargarDatos();
    }

    // Buscador flexible de datos (IMPORTANTE para que aparezcan los textos)
    function getData(obj, keys) {
        const foundKey = Object.keys(obj).find(k => keys.includes(k.toLowerCase().trim()));
        return foundKey ? obj[foundKey] : "";
    }

    async function cargarDatos() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = '<p style="text-align:center; width:100%;">Cargando soluciones...</p>';

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            grid.innerHTML = '';

            data.forEach(item => {
                // Aquí definimos los nombres que usas en tu Excel
                const titulo = getData(item, ["titulo", "nombre", "item", "title"]);
                const desc = getData(item, ["descripcion", "detalle", "description"]);
                const precio = getData(item, ["precio", "valor", "costo", "price"]);
                const img = getData(item, ["imagenurl", "imagen", "foto", "url"]);
                const tipo = getData(item, ["tipo", "categoria"]).toLowerCase();
                const sub = getData(item, ["subcategoria", "sub"]).toUpperCase();

                grid.innerHTML += `
                    <div class="card" data-category="${tipo}">
                        <img src="${img || 'https://via.placeholder.com/400x300?text=ARTEMISA'}" class="card-img">
                        <div class="card-content">
                            <span style="font-size:0.7rem; font-weight:800; color:var(--gold)">${sub}</span>
                            <h3 style="margin:10px 0; color:var(--black)">${titulo}</h3>
                            <p style="font-size:0.85rem; color:#64748b; line-height:1.5; flex-grow:1">${desc}</p>
                            <div class="price-tag">$${precio}</div>
                            <button class="btn-buy" onclick="window.open('https://wa.me/${TEL}?text=Me interesa: *${titulo}*')">
                                CONSULTAR / ADQUIRIR
                            </button>
                        </div>
                    </div>`;
            });
        } catch (e) {
            grid.innerHTML = '<p>Error al conectar con la base de datos.</p>';
        }
    }

    function filterItems(cat, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.querySelectorAll('.card').forEach(card => {
            const itemCat = card.getAttribute('data-category');
            card.style.display = (cat === 'todos' || itemCat.includes(cat)) ? 'flex' : 'none';
        });
    }

    // Cargar datos por defecto al iniciar si es necesario
</script>
</body>
</html>
