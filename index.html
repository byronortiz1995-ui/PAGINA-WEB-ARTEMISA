<script>
    const TEL = "593939344200";
    const API_URL = "https://script.google.com/macros/s/AKfycbwQMvnCggh9cH8x9Om_FOq6G6B6NJmYgk0I2ks5Wye-dW6hS29DjNeFK3vXt-QXIAMyJQ/exec";
    
    let catalogData = []; 
    let currentModalItemIndex = null;
    let cart = []; 

    function showCatalog() {
        document.getElementById('view-home').classList.remove('active');
        document.getElementById('view-catalog').classList.add('active');
        window.scrollTo(0, 0); 
        if(catalogData.length === 0) fetchData();
    }

    function showHome() {
        document.getElementById('view-catalog').classList.remove('active');
        document.getElementById('view-home').classList.add('active');
        window.scrollTo(0, 0);
    }

    // Extractor seguro insensible a mayúsculas o minúsculas que calza con tu doGet robusto
    function getVal(item, keys) {
        const foundKey = Object.keys(item).find(k => keys.includes(k.toLowerCase().trim()));
        return foundKey ? item[foundKey] : "";
    }

    async function fetchData() {
        const loadingMsg = document.getElementById('loading-msg');

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            loadingMsg.style.display = 'none';
            catalogData = []; 

            data.forEach(item => {
                // Sincronización exacta con los nombres de salida de tu doGet()
                const title = getVal(item, ["titulo"]);
                if(!title) return;

                const desc = getVal(item, ["descripcion"]);
                const precioBase = parseFloat(getVal(item, ["precio"])) || 0;
                const precioAnterior = parseFloat(getVal(item, ["precioanterior"])) || 0;
                let stock = getVal(item, ["stock"]);
                const img = getVal(item, ["imagenurl"]) || 'https://via.placeholder.com/400x300?text=ARTEMISA';
                const type = (getVal(item, ["tipo"]) || "").toLowerCase();
                const sub = getVal(item, ["subcategoria"]) || "General";

                // Cálculo lógico directo de promoción basado en si existe un Precio Anterior mayor en la tabla
                let precioFinal = precioBase;
                let enPromocion = false;
                let dctoPorcentaje = 0;

                if (precioAnterior > precioBase && precioBase > 0) {
                    dctoPorcentaje = Math.round(((precioAnterior - precioBase) / precioAnterior) * 100);
                    precioFinal = precioBase;
                    enPromocion = true;
                }

                let stockNumerico = parseInt(stock);
                if (isNaN(stockNumerico)) stockNumerico = 999; 
                const isAgotado = stock !== "" && stockNumerico <= 0 && type !== "servicio";

                catalogData.push({
                    title, desc, precioBase: enPromocion ? precioAnterior : precioBase, precioFinal, enPromocion, dctoPorcentaje, stock: stockNumerico, img, type, isAgotado, sub
                });
            });

            renderGrids();

        } catch (e) {
            console.error(e);
            loadingMsg.innerHTML = 'Error de conexión. Verifica tu internet y recarga la página.';
            loadingMsg.style.color = 'var(--red)';
        }
    }

    function renderGrids() {
        const gridServicios = document.getElementById('grid-servicios');
        const gridTienda = document.getElementById('grid-tienda');
        const gridOfertas = document.getElementById('grid-ofertas');

        gridServicios.innerHTML = ''; gridTienda.innerHTML = ''; gridOfertas.innerHTML = '';
        
        let hasServicios = false, hasTienda = false, hasOfertas = false;

        catalogData.forEach((item, index) => {
            const cardHTML = `
                <div class="card">
                    ${item.enPromocion ? `<div class="badge-promo">OFERTA -${item.dctoPorcentaje}%</div>` : ''}
                    <img src="${item.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x300?text=ARTEMISA'">
                    <div class="card-content">
                        <div class="stock-tag" style="color:${item.isAgotado ? 'var(--red)' : 'var(--green)'}">
                            ${item.isAgotado ? 'Agotado' : (item.type.includes('servicio') || item.stock === 999 ? 'Servicio Disponible' : 'Stock: ' + item.stock)}
                        </div>
                        <h3 style="margin:5px 0 10px; color:var(--black); font-size:1.1rem; line-height: 1.3;">${item.title}</h3>
                        
                        <p class="desc-preview">${item.desc}</p>
                        
                        <div class="price-box">
                            ${item.enPromocion ? `<span class="old-price">$${item.precioBase.toFixed(2)}</span>` : ''}
                            <span class="current-price">$${item.precioFinal.toFixed(2)}</span>
                        </div>

                        <button class="btn-specs" onclick="openModal(${index})">
                            📋 Ver Detalles
                        </button>
                    </div>
                </div>`;

            if (item.enPromocion) { gridOfertas.innerHTML += cardHTML; hasOfertas = true; } 
            if (item.type.includes('servicio')) { gridServicios.innerHTML += cardHTML; hasServicios = true; } 
            else if (!item.enPromocion) { gridTienda.innerHTML += cardHTML; hasTienda = true; }
        });

        // Control de pestañas inteligente para arrancar en la que contenga datos válidos
        if (hasServicios) filter('servicios', document.getElementById('btn-servicios'));
        else if (hasTienda) filter('tienda', document.getElementById('btn-tienda'));
        else if (hasOfertas) filter('ofertas', document.getElementById('btn-ofertas'));
    }

    function filter(cat, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');

        const secServicios = document.getElementById('section-servicios');
        const secTienda = document.getElementById('section-tienda');
        const secOfertas = document.getElementById('section-ofertas');

        secServicios.style.display = 'none'; secTienda.style.display = 'none'; secOfertas.style.display = 'none';

        if (cat === 'servicios' && document.getElementById('grid-servicios').innerHTML !== '') secServicios.style.display = 'block';
        if (cat === 'tienda' && document.getElementById('grid-tienda').innerHTML !== '') secTienda.style.display = 'block';
        if (cat === 'ofertas' && document.getElementById('grid-ofertas').innerHTML !== '') secOfertas.style.display = 'block';
    }

    function openModal(index) {
        currentModalItemIndex = index;
        const item = catalogData[index];
        
        document.getElementById('m-img').src = item.img;
        document.getElementById('m-title').innerText = item.title;
        document.getElementById('m-desc').innerText = item.desc;
        document.getElementById('m-qty').value = 1;
        
        const stockEl = document.getElementById('m-stock');
        stockEl.innerText = item.isAgotado ? 'Agotado' : (item.type.includes('servicio') || item.stock === 999 ? 'Servicio Disponible' : 'Stock: ' + item.stock);
        stockEl.style.color = item.isAgotado ? 'var(--red)' : 'var(--green)';

        const priceEl = document.getElementById('m-price');
        const oldPriceEl = document.getElementById('m-old-price');
        priceEl.innerText = `$${item.precioFinal.toFixed(2)}`;
        
        if (item.enPromocion) {
            oldPriceEl.innerText = `$${item.precioBase.toFixed(2)}`;
            oldPriceEl.style.display = 'inline';
        } else {
            oldPriceEl.style.display = 'none';
        }

        const addBtn = document.getElementById('m-add-btn');
        addBtn.disabled = item.isAgotado;
        addBtn.innerText = item.isAgotado ? "SIN STOCK" : "🛒 AGREGAR AL CARRITO";

        document.body.style.overflow = 'hidden';
        document.getElementById('modal-specs').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-specs').style.display = 'none';
        document.body.style.overflow = 'auto'; 
    }

    document.getElementById('modal-specs').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    function changeModalQty(change) {
        const input = document.getElementById('m-qty');
        const item = catalogData[currentModalItemIndex];
        
        let newVal = parseInt(input.value) + change;
        if(newVal < 1) newVal = 1;
        
        // Los servicios técnicos no tienen límite físico de stock para el carrito
        if (newVal > item.stock && item.type !== 'servicio') newVal = item.stock;

        input.value = newVal;
    }

    function addModalToCart() {
        const item = catalogData[currentModalItemIndex];
        const qtyToAdd = parseInt(document.getElementById('m-qty').value);
        const existingItem = cart.find(c => c.index === currentModalItemIndex);
        
        if(existingItem) {
            if (existingItem.qty + qtyToAdd > item.stock && item.type !== 'servicio') {
                alert(`Solo hay ${item.stock} unidades disponibles. Ya tienes ${existingItem.qty} en el carrito.`);
                existingItem.qty = item.stock;
            } else {
                existingItem.qty += qtyToAdd;
            }
        } else {
            cart.push({ ...item, index: currentModalItemIndex, qty: qtyToAdd });
        }
        
        updateCartUI();
        closeModal();
        toggleCart(); 
    }

    function removeFromCart(cartIndex) {
        cart.splice(cartIndex, 1);
        updateCartUI();
    }

    function toggleCart() {
        const sidebar = document.getElementById('cart-sidebar');
        const overlay = document.getElementById('cart-overlay');
        
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
        
        if (sidebar.classList.contains('open')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = 'auto';
        }
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        const badge = document.getElementById('cart-badge-count');
        const totalEl = document.getElementById('cart-total-price');
        
        container.innerHTML = '';
        let total = 0;
        let count = 0;

        if(cart.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:50px;">El carrito está vacío</p>';
        } else {
            cart.forEach((cItem, i) => {
                const subtotal = cItem.precioFinal * cItem.qty;
                total += subtotal;
                count += cItem.qty;
                
                container.innerHTML += `
                    <div class="cart-item">
                        <div style="flex-grow:1; padding-right:10px;">
                            <div class="cart-item-title">${cItem.title}</div>
                            <div style="font-size:0.85rem; color:#64748b;">Cant: ${cItem.qty} x $${cItem.precioFinal.toFixed(2)}</div>
                            <div class="cart-item-price">$${subtotal.toFixed(2)}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${i})">X</button>
                    </div>
                `;
            });
        }

        badge.innerText = count;
        totalEl.innerText = `$${total.toFixed(2)}`;
    }

    function checkoutWA() {
        if (cart.length === 0) return;
        
        let text = "Hola *Artemisa Tech*, me interesa realizar el siguiente pedido del catálogo web:\n\n";
        let total = 0;
        
        cart.forEach(cItem => {
            const sub = cItem.precioFinal * cItem.qty;
            total += sub;
            text += `▪️ *${cItem.qty}x* ${cItem.title} \n   (Subtotal: $${sub.toFixed(2)})\n`;
        });
        
        text += `\n*TOTAL ESTIMADO: $${total.toFixed(2)}*\n\nPor favor, confirmarme disponibilidad y pasos a seguir.`;
        
        window.open(`https://wa.me/${TEL}?text=${encodeURIComponent(text)}`);
    }
</script>
