<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMISA | Soluciones Técnicas en Crecimiento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --black: #0f172a; --white: #ffffff;
            --gray-bg: #f8fafc; --green: #22c55e; --slate-200: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--gray-bg); margin: 0; overflow-x: hidden; color: var(--black); }

        .page { display: none; width: 100%; min-height: 100vh; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HOME: TONO HONESTO Y PROFESIONAL --- */
        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=2070&auto=format&fit=crop') center/cover;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white; padding: 0 20px;
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: 4px; color: var(--gold); margin: 0; }
        
        .hero p { 
            max-width: 650px; margin: 20px 0 35px; font-size: 1.15rem; line-height: 1.6; 
            color: #e2e8f0; font-weight: 300;
        }

        .btn-cta {
            background: var(--gold); color: var(--black); padding: 18px 50px;
            border-radius: 12px; font-weight: 800; border: none; cursor: pointer;
            text-transform: uppercase; font-size: 1rem; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }
        .btn-cta:hover { transform: translateY(-3px); background: white; }

        /* --- NAVEGACIÓN APP --- */
        .app-bar { 
            background: var(--black); color: white; padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold);
        }
        .btn-back { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* --- FILTROS --- */
        .filter-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; background: white; overflow-x: auto; }
        .filter-btn { background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .filter-btn.active { background: var(--black); color: var(--gold); }

        /* --- GRID Y CARDS --- */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 25px; }
        
        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            border: 1px solid var(--slate-200);
        }
        .card-img { width: 100%; height: 210px; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card-title { font-size: 1.3rem; font-weight: 800; margin: 8px 0; color: var(--black); }
        .card-desc { font-size: 0.9rem; color: #64748b; line-height: 1.5; margin-bottom: 12px; flex-grow: 1; }
        
        .price-box { 
            font-size: 1.6rem; font-weight: 900; color: var(--black); 
            background: #f8fafc; padding: 10px; border-radius: 10px; 
            text-align: center; margin: 10px 0; border: 1px solid var(--slate-200);
        }

        .btn-wa { 
            background: var(--black); color: var(--gold); padding: 15px; 
            border-radius: 10px; font-weight: 800; border: none; cursor: pointer; width: 100%;
        }
        .btn-wa:hover { background: var(--green); color: white; }
    </style>
</head>
<body>

<div id="view-home" class="page active">
    <section class="hero">
        <h1>ARTEMISA</h1>
        <p>Impulsando soluciones técnicas con dedicación y aprendizaje continuo. Nos capacitamos cada día para brindarte un servicio transparente en soporte IT, mantenimiento y soluciones para tu hogar o negocio.</p>
        <button class="btn-cta" onclick="showCatalog()">Ver Catálogo y Servicios</button>
    </section>
</div>

<div id="view-catalog" class="page">
    <div class="app-bar">
        <button class="btn-back" onclick="showHome()">← Inicio</button>
        <span style="font-weight: 800; letter-spacing: 1px;">PORTAFOLIO ARTEMISA</span>
        <div style="width: 50px;"></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('todos', this)">Todo</button>
        <button class="filter-btn" onclick="filter('servicio', this)">Servicios</button>
        <button class="filter-btn" onclick="filter('tienda', this)">Tienda</button>
    </div>

    <div class="container">
        <div class="grid" id="catalog-grid">
            <p style="text-align:center; width:100%;">Sincronizando inventario...</p>
        </div>
    </div>
</div>

<script>
    const TEL = "593939344200";
    const API_URL = "https://script.google.com/macros/s/AKfycbwQMvnCggh9cH8x9Om_FOq6G6B6NJmYgk0I2ks5Wye-dW6hS29DjNeFK3vXt-QXIAMyJQ/exec";

    function showCatalog() {
        document.getElementById('view-home').classList.remove('active');
        document.getElementById('view-catalog').classList.add('active');
        fetchData();
    }

    function showHome() {
        document.getElementById('view-catalog').classList.remove('active');
        document.getElementById('view-home').classList.add('active');
    }

    // Extractor dinámico de datos para asegurar que aparezcan los textos
    function getVal(item, keys) {
        const foundKey = Object.keys(item).find(k => keys.includes(k.toLowerCase().trim()));
        return foundKey ? item[foundKey] : "";
    }

    async function fetchData() {
        const grid = document.getElementById('catalog-grid');
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            grid.innerHTML = '';

            data.forEach(item => {
                const title = getVal(item, ["titulo", "nombre", "item", "title"]);
                const desc = getVal(item, ["descripcion", "detalle", "description"]);
                const price = getVal(item, ["precio", "valor", "costo", "price"]);
                const img = getVal(item, ["imagenurl", "imagen", "foto", "url"]);
                const type = getVal(item, ["tipo", "categoria"]).toLowerCase();
                const sub = getVal(item, ["subcategoria", "sub"]).toUpperCase();

                if(!title) return;

                grid.innerHTML += `
                    <div class="card" data-type="${type}">
                        <img src="${img || 'https://via.placeholder.com/400x300?text=ARTEMISA'}" class="card-img">
                        <div class="card-content">
                            <span style="font-size:0.7rem; font-weight:800; color:var(--gold)">${sub || 'PROXIMAMENTE'}</span>
                            <div class="card-title">${title}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="price-box">${isNaN(price) ? price : '$' + price}</div>
                            <button class="btn-wa" onclick="window.open('https://wa.me/${TEL}?text=Hola Artemisa, deseo información sobre: *${title}*')">
                                Me Interesa
                            </button>
                        </div>
                    </div>`;
            });
        } catch (e) {
            grid.innerHTML = '<p>Error al cargar datos. Intente refrescar.</p>';
        }
    }

    function filter(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(card => {
            const t = card.getAttribute('data-type');
            card.style.display = (cat === 'todos' || t.includes(cat)) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
